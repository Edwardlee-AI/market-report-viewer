<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>市場報告</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>市場報告</h1>
          <p>每日草稿 / 自動摘要 / 發佈版本</p>
        </div>
        <div class="sidebar-controls">
          <input id="searchInput" type="search" placeholder="搜尋日期，例如 2026-04-12" />
        </div>
        <nav id="reportList" class="report-list"></nav>
      </aside>

      <main class="content">
        <header class="content-header">
          <div>
            <h2 id="pageTitle">載入中...</h2>
            <p id="pageMeta" class="muted"></p>
          </div>
          <div id="docTabs" class="doc-tabs"></div>
        </header>

        <section id="relatedLinks" class="related-links"></section>
        <article id="viewer" class="viewer">準備中...</article>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
